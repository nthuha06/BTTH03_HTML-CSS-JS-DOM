<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quản lý công việc</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Quản lý công việc cá nhân</h1>

    <button id="openModalBtn">+ Thêm công việc</button>

    <!-- Statistics -->
    <div class="summary">
      <p>Tổng công việc: <span id="totalTasks">0</span></p>
      <p>Đã hoàn thành: <span id="completedTasks">0</span></p>
      <p>Chưa hoàn thành: <span id="pendingTasks">0</span></p>
    </div>

    <!-- Message -->
    <div id="message"></div>

    <!-- Task List -->
    <div id="taskList"></div>

  </div>

  <!-- Modal -->
  <div class="modal hidden" id="taskModal">

    <div class="modal-content">

      <span class="close-btn" id="closeModalBtn">&times;</span>

      <h2 id="modalTitle">Thêm công việc</h2>

      <form id="taskForm">

        <input type="text" id="title" placeholder="Tiêu đề">

        <textarea id="description" placeholder="Mô tả"></textarea>

        <input type="date" id="deadline">

        <select id="priority">
          <option value="Thấp">Thấp</option>
          <option value="Trung bình">Trung bình</option>
          <option value="Cao">Cao</option>
        </select>

        <button type="submit">Lưu công việc</button>

      </form>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
